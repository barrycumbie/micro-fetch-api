<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brain Bucket API Consumer - Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./assets/css/styles.css" rel="stylesheet" />
    <script defer src="./assets/js/auth-gateway.js"></script>
    <script defer src="./assets/js/auth-page.js"></script>
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h1 class="h4 mb-3">Brain Bucket API Consumer</h1>
              <p class="text-muted">Sign in to continue.</p>
              <form id="login-form">
                <div class="mb-3">
                  <label class="form-label" for="username">Username</label>
                  <input class="form-control" id="username" name="username" required />
                </div>
                <div class="mb-3">
                  <label class="form-label" for="password">Password</label>
                  <input class="form-control" id="password" name="password" type="password" required />
                </div>
                <button class="btn btn-primary w-100" type="submit">Sign In</button>
              </form>
              <p id="auth-message" class="text-danger small mt-3 mb-0"></p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brain Bucket API Consumer - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./assets/css/styles.css" rel="stylesheet" />
    <script defer src="./assets/js/auth-gateway.js"></script>
    <script defer src="./assets/js/api-client.js"></script>
    <script defer src="./assets/js/index-page.js"></script>
  </head>
  <body>
    <main class="container py-4">
      <header class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="h4 mb-1">Brain Bucket API Consumer</h1>
          <p class="text-muted mb-0">Welcome, <span id="username-output"></span>.</p>
        </div>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-secondary" href="./pages/profile.html">Protected Page</a>
          <button id="sign-out-btn" class="btn btn-outline-danger" type="button">Sign Out</button>
        </div>
      </header>

      <section class="card mb-3">
        <div class="card-body">
          <h2 class="h5">Example API Calls</h2>
          <p class="mb-3">These calls use the shared API client. A bearer token is attached when available.</p>
          <div class="d-flex gap-2 flex-wrap mb-3">
            <button id="get-btn" class="btn btn-primary" type="button">Run GET /posts?_limit=3</button>
            <button id="post-btn" class="btn btn-success" type="button">Run POST /posts</button>
          </div>
          <p id="api-message" class="mb-2"></p>
          <pre id="api-output" class="result-box mb-0"></pre>
        </div>
      </section>
    </main>
  </body>
</html>

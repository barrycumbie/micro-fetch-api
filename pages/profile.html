<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brain Bucket API Consumer - Profile (Protected)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../assets/css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <main class="container py-4">
      <div class="flow-banner mb-3">
        Flow: Protected nested page uses the same guard and redirects to auth.html if session is missing.
      </div>

      <header class="mb-3">
        <h1 class="h4 mb-2">Profile Page (Protected)</h1>
        <p class="mb-0">This page is in a nested folder and still uses the same shared auth guard.</p>
      </header>

      <section class="card simple-card mb-3">
        <div class="card-body">
          <p class="mb-1"><strong>Signed in user:</strong> <span id="username-output"></span></p>
          <p class="mb-0">If your session is missing, this page redirects to <strong>auth.html</strong>.</p>
        </div>
      </section>

      <section class="d-flex gap-2 flex-wrap">
        <a class="btn btn-outline-secondary" href="../index.html">Back To Index</a>
        <button id="sign-out-btn" class="btn btn-outline-danger" type="button">Sign Out</button>
      </section>
    </main>
    <!-- profile.js: protects nested page and handles sign-out -->
    <script src="../assets/js/profile.js"></script>
  </body>
</html>
